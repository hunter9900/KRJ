<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRJ - Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">👑</div>
            <h1 class="text-2xl font-bold text-gray-800">KRJ Client Portal</h1>
            <p class="text-gray-500 mt-1">Access your account</p>
        </div>
        
        <div class="mb-4">
            <input type="email" id="email" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Email">
        </div>
        <div class="mb-6">
            <input type="password" id="password" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Password">
        </div>
        <button id="loginBtn" class="w-full bg-purple-600 text-white p-3 rounded-lg hover:bg-purple-700 transition font-semibold">Login</button>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-center hidden"></div>
    </div>

    <script>
        const SB_URL = 'https://llngjwyqyfppccdcwzgn.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsbmdqd3lxeWZwcGNjZGN3emduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTkyNTIsImV4cCI6MjA5MTQ5NTI1Mn0.s-YW4LcFcSizuuXbZ9PUAUPqoY-07fs9h03GQatdrMA';
        
        const sbClient = window.supabase.createClient(SB_URL, SB_ANON_KEY);
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await sbClient
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .eq('role', 'client');
            
            if (error || !data || data.length === 0) {
                document.getElementById('errorMsg').textContent = 'Invalid credentials or not a client account';
                document.getElementById('errorMsg').classList.remove('hidden');
                return;
            }
            
            const user = data[0];
            localStorage.setItem('krj_client', JSON.stringify({
                id: user.id,
                email: user.email,
                name: user.full_name,
                role: user.role
            }));
            
            window.location.href = 'client-dashboard.html';
        });
    </script>
</body>
</html>
