<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRJ - Sales Portal with 3D Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .product-card { cursor: pointer; transition: all 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        #viewerContainer { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">💍 KRJ Sales Portal</h1>
                    <p id="userName" class="text-gray-500 text-sm mt-1">Loading...</p>
                </div>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg">Logout</button>
            </div>
        </div>
        
        <!-- Two Column Layout -->
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Left: Product List -->
            <div class="lg:w-1/2">
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <h2 class="font-bold text-lg mb-3">📦 Products</h2>
                    <input type="text" id="searchInput" placeholder="Search products..." class="w-full p-2 border rounded-lg mb-3">
                    <div id="productsList" class="space-y-2 max-h-96 overflow-y-auto">
                        Loading products...
                    </div>
                </div>
            </div>
            
            <!-- Right: 3D Viewer -->
            <div class="lg:w-1/2">
                <div class="bg-gray-900 rounded-xl shadow-sm overflow-hidden">
                    <div class="p-3 bg-gray-800 text-white">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm opacity-75">3D Product Viewer</p>
                                <p id="viewerProductName" class="font-bold">Select a product</p>
                                <p id="viewerPrice" class="text-yellow-400 text-sm"></p>
                            </div>
                            <div class="flex gap-2">
                                <button id="autoRotateBtn" class="bg-gray-700 px-3 py-1 rounded text-sm">🔄 Auto</button>
                                <button id="resetViewBtn" class="bg-gray-700 px-3 py-1 rounded text-sm">🎯 Reset</button>
                            </div>
                        </div>
                        <div class="mt-2 flex gap-2">
                            <button data-metal="yellow" data-color="#ffd700" class="metal-btn bg-yellow-500 px-3 py-1 rounded text-sm">Yellow</button>
                            <button data-metal="white" data-color="#e8e8e8" class="metal-btn bg-gray-300 px-3 py-1 rounded text-sm">White</button>
                            <button data-metal="rose" data-color="#e8a87c" class="metal-btn bg-rose-400 px-3 py-1 rounded text-sm">Rose</button>
                            <button data-metal="platinum" data-color="#b8b8c8" class="metal-btn bg-gray-400 px-3 py-1 rounded text-sm">Platinum</button>
                        </div>
                    </div>
                    <div id="viewerContainer" style="width: 100%; height: 400px; background: #1a1a2e;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Supabase setup
        const SB_URL = 'https://llngjwyqyfppccdcwzgn.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsbmdqd3lxeWZwcGNjZGN3emduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTkyNTIsImV4cCI6MjA5MTQ5NTI1Mn0.s-YW4LcFcSizuuXbZ9PUAUPqoY-07fs9h03GQatdrMA';
        const sbClient = window.supabase.createClient(SB_URL, SB_ANON_KEY);
        
        // 3D variables
        let scene, camera, renderer, controls, currentModel = null;
        let currentProductPrice = 35000;
        let currentMetalMultiplier = 1.0;
        
        // Check login
        async function checkAuth() {
            const userJson = localStorage.getItem('krj_user');
            if (!userJson) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userJson);
            document.getElementById('userName').innerHTML = `${user.name} (${user.role})`;
            loadProducts();
        }
        
        // Load products from Supabase
        async function loadProducts() {
            const { data, error } = await sbClient.from('products').select('*').order('name');
            const container = document.getElementById('productsList');
            
            if (error) {
                container.innerHTML = '<p class="text-red-500">Error loading products</p>';
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No products found</p>';
                return;
            }
            
            container.innerHTML = data.map(product => `
                <div onclick="selectProduct(${product.id}, '${product.name}', ${product.price})" 
                     class="product-card bg-gray-50 p-3 rounded-lg hover:bg-gray-100">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-semibold">${product.name}</p>
                            <p class="text-sm text-gray-500">${product.sku} | ${product.category}</p>
                        </div>
                        <p class="font-bold text-blue-600">₹${product.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }
        
        // Initialize 3D viewer
        function init3DViewer() {
            const container = document.getElementById('viewerContainer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(2, 1.5, 3);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            controls.enableZoom = true;
            controls.target.set(0, 0, 0);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(2, 5, 3);
            mainLight.castShadow = true;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466cc, 0.4);
            fillLight.position.set(0, -2, 0);
            scene.add(fillLight);
            
            const rimLight = new THREE.PointLight(0xffaa66, 0.5);
            rimLight.position.set(-1, 1, -2);
            scene.add(rimLight);
            
            // Grid floor
            const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.8;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);
            
            // Create default ring
            createRingModel('#ffd700');
            
            animate();
            window.addEventListener('resize', onResize);
        }
        
        function createRingModel(color) {
            if (currentModel) scene.remove(currentModel);
            
            const group = new THREE.Group();
            
            // Band
            const bandGeo = new THREE.TorusGeometry(0.85, 0.12, 64, 128);
            const bandMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.92, roughness: 0.25 });
            const band = new THREE.Mesh(bandGeo, bandMat);
            band.rotation.x = Math.PI / 2;
            group.add(band);
            
            // Center diamond
            const diamondGeo = new THREE.OctahedronGeometry(0.28);
            const diamondMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, metalness: 0.1, roughness: 0.15 });
            const diamond = new THREE.Mesh(diamondGeo, diamondMat);
            diamond.position.y = 0.18;
            group.add(diamond);
            
            // Small diamonds
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const small = new THREE.Mesh(
                    new THREE.SphereGeometry(0.07, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xcceeff, metalness: 0.2 })
                );
                small.position.set(Math.cos(angle) * 0.72, 0.1, Math.sin(angle) * 0.72);
                group.add(small);
            }
            
            scene.add(group);
            currentModel = group;
        }
        
        function updateModelColor(color) {
            if (!currentModel) return;
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (child.material.color.getHex() !== 0xaaddff && 
                        child.material.color.getHex() !== 0xcceeff) {
                        child.material.color.set(color);
                    }
                }
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        function onResize() {
            const container = document.getElementById('viewerContainer');
            if (!container) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        // Global function for product selection
        window.selectProduct = (id, name, price) => {
            currentProductPrice = price;
            document.getElementById('viewerProductName').innerHTML = name;
            document.getElementById('viewerPrice').innerHTML = `Base Price: ₹${price.toLocaleString()} | Current: ₹${Math.round(price * currentMetalMultiplier).toLocaleString()}`;
            
            // Reset to yellow gold when selecting new product
            currentMetalMultiplier = 1.0;
            updateModelColor('#ffd700');
            document.getElementById('viewerPrice').innerHTML = `Base Price: ₹${price.toLocaleString()} | Current: ₹${price.toLocaleString()}`;
        };
        
        // Metal buttons
        document.querySelectorAll('.metal-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.getAttribute('data-color');
                const metal = btn.getAttribute('data-metal');
                let multiplier = 1.0;
                
                switch(metal) {
                    case 'white': multiplier = 1.05; break;
                    case 'rose': multiplier = 1.08; break;
                    case 'platinum': multiplier = 1.5; break;
                    default: multiplier = 1.0;
                }
                
                currentMetalMultiplier = multiplier;
                updateModelColor(color);
                
                const newPrice = Math.round(currentProductPrice * multiplier);
                document.getElementById('viewerPrice').innerHTML = `Base Price: ₹${currentProductPrice.toLocaleString()} | Current: ₹${newPrice.toLocaleString()}`;
            });
        });
        
        // Controls
        document.getElementById('autoRotateBtn').addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            document.getElementById('autoRotateBtn').innerHTML = controls.autoRotate ? '⏸️ Stop' : '🔄 Auto';
        });
        
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.set(2, 1.5, 3);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('krj_user');
            window.location.href = 'login.html';
        });
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const { data } = await sbClient.from('products').select('*');
            const filtered = data.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.sku.toLowerCase().includes(searchTerm)
            );
            const container = document.getElementById('productsList');
            container.innerHTML = filtered.map(product => `
                <div onclick="selectProduct(${product.id}, '${product.name}', ${product.price})" 
                     class="product-card bg-gray-50 p-3 rounded-lg hover:bg-gray-100">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-semibold">${product.name}</p>
                            <p class="text-sm text-gray-500">${product.sku} | ${product.category}</p>
                        </div>
                        <p class="font-bold text-blue-600">₹${product.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        });
        
        // Start
        checkAuth();
        setTimeout(() => init3DViewer(), 500);
    </script>
</body>
</html>
