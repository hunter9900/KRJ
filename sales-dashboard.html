<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KRJ Sales - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        @media (max-width: 768px) {
            .product-card {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-3 py-4 max-w-7xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <div class="flex justify-between items-center flex-wrap gap-3">
                <div>
                    <h1 class="text-xl font-bold text-gray-800">💍 KRJ Sales Portal</h1>
                    <p id="repInfo" class="text-sm text-gray-500 mt-1">Loading...</p>
                </div>
                <div class="flex gap-2">
                    <button id="viewCartBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">🛒 Cart (<span id="cartCount">0</span>)</button>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
                </div>
            </div>
        </div>
        
        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <input type="text" id="searchInput" placeholder="🔍 Search products by name or SKU..." class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-20">
            <div class="text-center py-8 col-span-full">Loading products...</div>
        </div>
        
        <!-- Cart Modal -->
        <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4 max-h-80vh overflow-y-auto">
                <h3 class="text-xl font-bold mb-4">Your Cart</h3>
                <div id="cartItems" class="space-y-3 mb-4">
                    <p class="text-gray-500 text-center">Cart is empty</p>
                </div>
                <div class="border-t pt-4">
                    <p class="font-bold text-lg">Total: ₹<span id="cartTotal">0</span></p>
                    <button id="checkoutBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg mt-3 font-semibold">Create Order</button>
                    <button id="closeCartBtn" class="w-full bg-gray-300 text-gray-700 p-3 rounded-lg mt-2">Close</button>
                </div>
            </div>
        </div>
        
        <!-- Order Confirmation Modal -->
        <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
                <h3 class="text-xl font-bold mb-4">Order Details</h3>
                <input type="text" id="clientName" placeholder="Client Name *" class="w-full p-2 border rounded mb-3">
                <input type="email" id="clientEmail" placeholder="Client Email" class="w-full p-2 border rounded mb-3">
                <div class="flex gap-3">
                    <button id="confirmOrderBtn" class="bg-green-600 text-white px-4 py-2 rounded flex-1">Confirm Order</button>
                    <button id="cancelConfirmBtn" class="bg-gray-300 text-gray-700 px-4 py-2 rounded flex-1">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://llngjwyqyfppccdcwzgn.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsbmdqd3lxeWZwcGNjZGN3emduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTkyNTIsImV4cCI6MjA5MTQ5NTI1Mn0.s-YW4LcFcSizuuXbZ9PUAUPqoY-07fs9h03GQatdrMA';
        
        const sbClient = window.supabase.createClient(SB_URL, SB_ANON_KEY);
        
        let currentUser = null;
        let allProducts = [];
        let cart = [];
        
        // Check authentication
        async function checkAuth() {
            const userJson = localStorage.getItem('krj_user');
            if (!userJson) {
                window.location.href = 'sales-login.html';
                return;
            }
            currentUser = JSON.parse(userJson);
            document.getElementById('repInfo').innerHTML = `${currentUser.name} | Commission: ${currentUser.commission_rate}%`;
            loadProducts();
        }
        
        async function loadProducts() {
            const { data, error } = await sbClient.from('products').select('*').order('name');
            const container = document.getElementById('productsGrid');
            
            if (error) {
                container.innerHTML = '<p class="text-red-500 col-span-full">Error loading products</p>';
                return;
            }
            
            allProducts = data || [];
            
            if (allProducts.length === 0) {
                container.innerHTML = '<p class="text-gray-500 col-span-full">No products available</p>';
                return;
            }
            
            renderProducts(allProducts);
        }
        
        function renderProducts(products) {
            const container = document.getElementById('productsGrid');
            container.innerHTML = products.map(product => `
                <div class="product-card bg-white rounded-xl shadow-sm overflow-hidden" onclick="addToCart(${product.id})">
                    <div class="p-4">
                        <div class="text-3xl mb-2">
                            ${product.category === 'Ring' ? '💍' : product.category === 'Necklace' ? '📿' : product.category === 'Earrings' ? '👂' : '💎'}
                        </div>
                        <h3 class="font-bold text-gray-800">${product.name}</h3>
                        <p class="text-sm text-gray-500 mt-1">${product.sku}</p>
                        <div class="mt-3 flex justify-between items-center">
                            <span class="text-xl font-bold text-blue-600">₹${Number(product.price).toLocaleString()}</span>
                            <span class="text-sm text-gray-500">Stock: ${product.stock_quantity}</span>
                        </div>
                        <button class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg text-sm hover:bg-blue-700 transition">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.sku.toLowerCase().includes(searchTerm)
            );
            renderProducts(filtered);
        });
        
        // Cart functions
        window.addToCart = (productId) => {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    sku: product.sku,
                    price: product.price,
                    quantity: 1
                });
            }
            updateCartUI();
        };
        
        function updateCartUI() {
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = cartCount;
            
            const cartItemsDiv = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p class="text-gray-500 text-center">Cart is empty</p>';
                document.getElementById('cartTotal').textContent = '0';
                return;
            }
            
            let total = 0;
            cartItemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="font-semibold">${item.name}</p>
                            <p class="text-sm text-gray-500">₹${item.price} x ${item.quantity}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">₹${itemTotal.toLocaleString()}</p>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').textContent = total.toLocaleString();
        }
        
        window.removeFromCart = (productId) => {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        };
        
        // Modal controls
        document.getElementById('viewCartBtn').onclick = () => {
            updateCartUI();
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartModal').classList.add('flex');
        };
        
        document.getElementById('closeCartBtn').onclick = () => {
            document.getElementById('cartModal').classList.add('hidden');
            document.getElementById('cartModal').classList.remove('flex');
        };
        
        document.getElementById('checkoutBtn').onclick = () => {
            if (cart.length === 0) {
                alert('Cart is empty');
                return;
            }
            document.getElementById('cartModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('confirmModal').classList.add('flex');
        };
        
        document.getElementById('cancelConfirmBtn').onclick = () => {
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
        };
        
        document.getElementById('confirmOrderBtn').onclick = async () => {
            const clientName = document.getElementById('clientName').value.trim();
            if (!clientName) {
                alert('Please enter client name');
                return;
            }
            
            const clientEmail = document.getElementById('clientEmail').value.trim();
            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const orderNumber = 'ORD-' + Date.now();
            
            // Create order
            const { error } = await sbClient.from('orders').insert([{
                order_number: orderNumber,
                client_name: clientName,
                client_email: clientEmail,
                total_amount: totalAmount,
                status: 'pending',
                sales_rep_id: currentUser.id
            }]);
            
            if (error) {
                alert('Error creating order: ' + error.message);
                return;
            }
            
            // Calculate commission
            const commissionAmount = totalAmount * (currentUser.commission_rate / 100);
            
            // Record commission
            await sbClient.from('commissions').insert([{
                sales_rep_id: currentUser.id,
                order_number: orderNumber,
                order_amount: totalAmount,
                commission_rate: currentUser.commission_rate,
                commission_amount: commissionAmount,
                status: 'pending'
            }]);
            
            alert(`Order created!\nOrder #: ${orderNumber}\nTotal: ₹${totalAmount.toLocaleString()}\nYour Commission: ₹${commissionAmount.toLocaleString()}`);
            
            // Reset cart and close modal
            cart = [];
            updateCartUI();
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            
            // Refresh to show updated stats
            loadProducts();
        };
        
        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('krj_user');
            window.location.href = 'sales-login.html';
        };
        
        checkAuth();
    </script>
</body>
</html>
