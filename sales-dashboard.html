<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KRJ Sales - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        @media (max-width: 768px) {
            .product-card {
                margin-bottom: 16px;
            }
        }
    </style>
        <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="3d-viewer.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-3 py-4 max-w-7xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <div class="flex justify-between items-center flex-wrap gap-3">
                <div>
                    <h1 class="text-xl font-bold text-gray-800">💍 KRJ Sales Portal</h1>
                    <p id="repInfo" class="text-sm text-gray-500 mt-1">Loading...</p>
                </div>
                <div class="flex gap-2">
                    <button id="viewCartBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">🛒 Cart (<span id="cartCount">0</span>)</button>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
                </div>
            </div>
        </div>
        
        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <input type="text" id="searchInput" placeholder="🔍 Search products by name or SKU..." class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

                <!-- 3D Viewer Section -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <div class="flex justify-between items-center mb-3 flex-wrap gap-3">
                <h2 class="font-bold text-lg">💎 3D Product Viewer</h2>
                <div class="flex gap-2">
                    <button id="autoRotateBtn" class="bg-gray-200 px-3 py-1 rounded text-sm">🔄 Auto Rotate</button>
                    <button id="resetViewBtn" class="bg-gray-200 px-3 py-1 rounded text-sm">🎯 Reset View</button>
                </div>
            </div>
            <div id="3dViewerContainer" style="width: 100%; height: 400px; border-radius: 12px; overflow: hidden; background: #1a1a2e;"></div>
            
            <!-- Metal Selector -->
            <div class="mt-4">
                <p class="text-sm text-gray-600 mb-2">Select Metal Type:</p>
                <div class="flex gap-2 flex-wrap">
                    <button data-metal="yellow_gold" class="metal-btn px-4 py-2 rounded-lg bg-yellow-500 text-white">🟡 Yellow Gold</button>
                    <button data-metal="white_gold" class="metal-btn px-4 py-2 rounded-lg bg-gray-300 text-gray-800">⚪ White Gold</button>
                    <button data-metal="rose_gold" class="metal-btn px-4 py-2 rounded-lg bg-rose-400 text-white">🌹 Rose Gold</button>
                    <button data-metal="platinum" class="metal-btn px-4 py-2 rounded-lg bg-gray-400 text-white">💎 Platinum</button>
                </div>
            </div>
            <div id="metalPriceInfo" class="mt-3 text-sm text-gray-500 hidden">
                Current price: <span id="currentMetalPrice">₹0</span> per gram
            </div>
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-20">
            <div class="text-center py-8 col-span-full">Loading products...</div>
        </div>
        
        <!-- Cart Modal -->
        <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4 max-h-80vh overflow-y-auto">
                <h3 class="text-xl font-bold mb-4">Your Cart</h3>
                <div id="cartItems" class="space-y-3 mb-4">
                    <p class="text-gray-500 text-center">Cart is empty</p>
                </div>
                <div class="border-t pt-4">
                    <p class="font-bold text-lg">Total: ₹<span id="cartTotal">0</span></p>
                    <button id="checkoutBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg mt-3 font-semibold">Create Order</button>
                    <button id="closeCartBtn" class="w-full bg-gray-300 text-gray-700 p-3 rounded-lg mt-2">Close</button>
                </div>
            </div>
        </div>
        
        <!-- Order Confirmation Modal -->
        <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
                <h3 class="text-xl font-bold mb-4">Order Details</h3>
                <input type="text" id="clientName" placeholder="Client Name *" class="w-full p-2 border rounded mb-3">
                <input type="email" id="clientEmail" placeholder="Client Email" class="w-full p-2 border rounded mb-3">
                <div class="flex gap-3">
                    <button id="confirmOrderBtn" class="bg-green-600 text-white px-4 py-2 rounded flex-1">Confirm Order</button>
                    <button id="cancelConfirmBtn" class="bg-gray-300 text-gray-700 px-4 py-2 rounded flex-1">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://llngjwyqyfppccdcwzgn.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsbmdqd3lxeWZwcGNjZGN3emduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTkyNTIsImV4cCI6MjA5MTQ5NTI1Mn0.s-YW4LcFcSizuuXbZ9PUAUPqoY-07fs9h03GQatdrMA';
        
        const sbClient = window.supabase.createClient(SB_URL, SB_ANON_KEY);
        
        let currentUser = null;
        let allProducts = [];
        let cart = [];
        
        // Check authentication
        async function checkAuth() {
            const userJson = localStorage.getItem('krj_user');
            if (!userJson) {
                window.location.href = 'sales-login.html';
                return;
            }
            currentUser = JSON.parse(userJson);
            document.getElementById('repInfo').innerHTML = `${currentUser.name} | Commission: ${currentUser.commission_rate}%`;
            loadProducts();
        }
        
        async function loadProducts() {
            const { data, error } = await sbClient.from('products').select('*').order('name');
            const container = document.getElementById('productsGrid');
            
            if (error) {
                container.innerHTML = '<p class="text-red-500 col-span-full">Error loading products</p>';
                return;
            }
            
            allProducts = data || [];
            
            if (allProducts.length === 0) {
                container.innerHTML = '<p class="text-gray-500 col-span-full">No products available</p>';
                return;
            }
            
            renderProducts(allProducts);
        }
        
        function renderProducts(products) {
            const container = document.getElementById('productsGrid');
            container.innerHTML = products.map(product => `
                <div class="product-card bg-white rounded-xl shadow-sm overflow-hidden" onclick="addToCart(${product.id})">
                    <div class="p-4">
                        <div class="text-3xl mb-2">
                            ${product.category === 'Ring' ? '💍' : product.category === 'Necklace' ? '📿' : product.category === 'Earrings' ? '👂' : '💎'}
                        </div>
                        <h3 class="font-bold text-gray-800">${product.name}</h3>
                        <p class="text-sm text-gray-500 mt-1">${product.sku}</p>
                        <div class="mt-3 flex justify-between items-center">
                            <span class="text-xl font-bold text-blue-600">₹${Number(product.price).toLocaleString()}</span>
                            <span class="text-sm text-gray-500">Stock: ${product.stock_quantity}</span>
                        </div>
                        <button class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg text-sm hover:bg-blue-700 transition">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.sku.toLowerCase().includes(searchTerm)
            );
            renderProducts(filtered);
        });
        
        // Cart functions
        window.addToCart = (productId) => {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    sku: product.sku,
                    price: product.price,
                    quantity: 1
                });
            }
            updateCartUI();
        };
        
        function updateCartUI() {
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = cartCount;
            
            const cartItemsDiv = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p class="text-gray-500 text-center">Cart is empty</p>';
                document.getElementById('cartTotal').textContent = '0';
                return;
            }
            
            let total = 0;
            cartItemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="font-semibold">${item.name}</p>
                            <p class="text-sm text-gray-500">₹${item.price} x ${item.quantity}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">₹${itemTotal.toLocaleString()}</p>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').textContent = total.toLocaleString();
        }
        
        window.removeFromCart = (productId) => {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        };
        
        // Modal controls
        document.getElementById('viewCartBtn').onclick = () => {
            updateCartUI();
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartModal').classList.add('flex');
        };
        
        document.getElementById('closeCartBtn').onclick = () => {
            document.getElementById('cartModal').classList.add('hidden');
            document.getElementById('cartModal').classList.remove('flex');
        };
        
        document.getElementById('checkoutBtn').onclick = () => {
            if (cart.length === 0) {
                alert('Cart is empty');
                return;
            }
            document.getElementById('cartModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('confirmModal').classList.add('flex');
        };
        
        document.getElementById('cancelConfirmBtn').onclick = () => {
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
        };
        
        document.getElementById('confirmOrderBtn').onclick = async () => {
            const clientName = document.getElementById('clientName').value.trim();
            if (!clientName) {
                alert('Please enter client name');
                return;
            }
            
            const clientEmail = document.getElementById('clientEmail').value.trim();
            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const orderNumber = 'ORD-' + Date.now();
            
            // Create order
            const { error } = await sbClient.from('orders').insert([{
                order_number: orderNumber,
                client_name: clientName,
                client_email: clientEmail,
                total_amount: totalAmount,
                status: 'pending',
                sales_rep_id: currentUser.id
            }]);
            
            if (error) {
                alert('Error creating order: ' + error.message);
                return;
            }
            
            // Calculate commission
            const commissionAmount = totalAmount * (currentUser.commission_rate / 100);
            
            // Record commission
            await sbClient.from('commissions').insert([{
                sales_rep_id: currentUser.id,
                order_number: orderNumber,
                order_amount: totalAmount,
                commission_rate: currentUser.commission_rate,
                commission_amount: commissionAmount,
                status: 'pending'
            }]);
            
            alert(`Order created!\nOrder #: ${orderNumber}\nTotal: ₹${totalAmount.toLocaleString()}\nYour Commission: ₹${commissionAmount.toLocaleString()}`);
            
            // Reset cart and close modal
            cart = [];
            updateCartUI();
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            
            // Refresh to show updated stats
            loadProducts();
        };
        
        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('krj_user');
            window.location.href = 'sales-login.html';
        };
        
        checkAuth();

                // Initialize 3D Viewer (using module import)
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let threeScene, threeCamera, threeRenderer, threeControls, threeCurrentModel = null;
        let currentMetalColor = '#ffd700';
        
        const metalOptions = {
            'yellow_gold': { color: '#ffd700', name: 'Yellow Gold', multiplier: 1.0, pricePerGram: 6500 },
            'white_gold': { color: '#e8e8e8', name: 'White Gold', multiplier: 1.05, pricePerGram: 6825 },
            'rose_gold': { color: '#e8a87c', name: 'Rose Gold', multiplier: 1.08, pricePerGram: 7020 },
            'platinum': { color: '#e5e4e2', name: 'Platinum', multiplier: 1.5, pricePerGram: 9750 }
        };
        
        function init3DViewer() {
            const container = document.getElementById('3dViewerContainer');
            if (!container) return;
            
            threeScene = new THREE.Scene();
            threeScene.background = new THREE.Color(0x1a1a2e);
            threeScene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);
            
            threeCamera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            threeCamera.position.set(2, 1.5, 3);
            
            threeRenderer = new THREE.WebGLRenderer({ antialias: true });
            threeRenderer.setSize(container.clientWidth, container.clientHeight);
            threeRenderer.setPixelRatio(window.devicePixelRatio);
            threeRenderer.shadowMap.enabled = true;
            container.appendChild(threeRenderer.domElement);
            
            threeControls = new OrbitControls(threeCamera, threeRenderer.domElement);
            threeControls.enableDamping = true;
            threeControls.dampingFactor = 0.05;
            threeControls.autoRotate = true;
            threeControls.autoRotateSpeed = 1.5;
            threeControls.enableZoom = true;
            threeControls.enablePan = false;
            threeControls.target.set(0, 0, 0);
            
            addLights();
            addEnvironment();
            createDefaultRing();
            
            animate();
            window.addEventListener('resize', () => onWindowResize());
        }
        
        function addLights() {
            const ambientLight = new THREE.AmbientLight(0x404040);
            threeScene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(2, 5, 3);
            mainLight.castShadow = true;
            threeScene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466cc, 0.3);
            fillLight.position.set(0, -2, 0);
            threeScene.add(fillLight);
            
            const rimLight = new THREE.PointLight(0xffaa66, 0.5);
            rimLight.position.set(-1, 1, -2);
            threeScene.add(rimLight);
            
            const warmLight = new THREE.PointLight(0xff8866, 0.4);
            warmLight.position.set(1, 1.5, 2);
            threeScene.add(warmLight);
        }
        
        function addEnvironment() {
            const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.75;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            threeScene.add(gridHelper);
            
            const particleCount = 200;
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesPositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlesPositions[i * 3] = (Math.random() - 0.5) * 8;
                particlesPositions[i * 3 + 1] = (Math.random() - 0.5) * 3 + 0.5;
                particlesPositions[i * 3 + 2] = (Math.random() - 0.5) * 6 - 2;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
            const particlesMaterial = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.02, transparent: true, opacity: 0.5 });
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            threeScene.add(particles);
        }
        
        function createDefaultRing() {
            if (threeCurrentModel) threeScene.remove(threeCurrentModel);
            
            const ringGroup = new THREE.Group();
            
            const bandGeometry = new THREE.TorusGeometry(0.8, 0.12, 64, 128);
            const bandMaterial = new THREE.MeshStandardMaterial({ color: currentMetalColor, metalness: 0.9, roughness: 0.3 });
            const band = new THREE.Mesh(bandGeometry, bandMaterial);
            band.rotation.x = Math.PI / 2;
            ringGroup.add(band);
            
            const stoneGeometry = new THREE.SphereGeometry(0.25, 32, 32);
            const stoneMaterial = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.1, roughness: 0.2, emissive: 0x224466 });
            const stone = new THREE.Mesh(stoneGeometry, stoneMaterial);
            stone.position.y = 0.15;
            ringGroup.add(stone);
            
            const haloCount = 8;
            for (let i = 0; i < haloCount; i++) {
                const angle = (i / haloCount) * Math.PI * 2;
                const smallStone = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xaaccff, metalness: 0.2, roughness: 0.1 })
                );
                smallStone.position.set(Math.cos(angle) * 0.65, 0.08, Math.sin(angle) * 0.65);
                ringGroup.add(smallStone);
            }
            
            threeScene.add(ringGroup);
            threeCurrentModel = ringGroup;
        }
        
        function updateMetalColor(color) {
            if (!threeCurrentModel) return;
            threeCurrentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (child.material.color.getHex() !== 0x88aaff && 
                        child.material.color.getHex() !== 0xaaccff) {
                        child.material.color.set(color);
                    }
                }
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (threeControls) threeControls.update();
            if (threeRenderer && threeScene && threeCamera) {
                threeRenderer.render(threeScene, threeCamera);
            }
        }
        
        function onWindowResize() {
            const container = document.getElementById('3dViewerContainer');
            if (!container || !threeCamera || !threeRenderer) return;
            threeCamera.aspect = container.clientWidth / container.clientHeight;
            threeCamera.updateProjectionMatrix();
            threeRenderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        // Metal selector handlers
        document.querySelectorAll('.metal-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const metalKey = btn.getAttribute('data-metal');
                const metal = metalOptions[metalKey];
                if (metal) {
                    currentMetalColor = metal.color;
                    updateMetalColor(currentMetalColor);
                    
                    const priceInfo = document.getElementById('metalPriceInfo');
                    const priceSpan = document.getElementById('currentMetalPrice');
                    priceSpan.textContent = metal.pricePerGram.toLocaleString();
                    priceInfo.classList.remove('hidden');
                    
                    // Update button styles
                    document.querySelectorAll('.metal-btn').forEach(b => {
                        b.classList.remove('ring-2', 'ring-offset-2', 'ring-black');
                    });
                    btn.classList.add('ring-2', 'ring-offset-2', 'ring-black');
                }
            });
        });
        
        document.getElementById('autoRotateBtn')?.addEventListener('click', () => {
            if (threeControls) {
                threeControls.autoRotate = !threeControls.autoRotate;
                document.getElementById('autoRotateBtn').textContent = threeControls.autoRotate ? '⏸️ Stop Rotate' : '🔄 Auto Rotate';
            }
        });
        
        document.getElementById('resetViewBtn')?.addEventListener('click', () => {
            if (threeCamera && threeControls) {
                threeCamera.position.set(2, 1.5, 3);
                threeControls.target.set(0, 0, 0);
                threeControls.update();
            }
        });
        
        // Initialize on page load
        init3DViewer();
    </script>
</body>
</html>
