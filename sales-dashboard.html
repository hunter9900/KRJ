<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KRJ Sales - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-3 py-4 max-w-7xl">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <div class="flex justify-between items-center flex-wrap gap-3">
                <div>
                    <h1 class="text-xl font-bold">💍 KRJ Sales Portal</h1>
                    <p id="repInfo" class="text-sm text-gray-500 mt-1">Loading...</p>
                </div>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="text-center py-8 col-span-full">Loading products...</div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://llngjwyqyfppccdcwzgn.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsbmdqd3lxeWZwcGNjZGN3emduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTkyNTIsImV4cCI6MjA5MTQ5NTI1Mn0.s-YW4LcFcSizuuXbZ9PUAUPqoY-07fs9h03GQatdrMA';
        
        const sbClient = window.supabase.createClient(SB_URL, SB_ANON_KEY);
        
        let currentUser = null;
        
        async function checkAuth() {
            const userJson = localStorage.getItem('krj_user');
            if (!userJson) {
                window.location.href = 'sales-login.html';
                return;
            }
            currentUser = JSON.parse(userJson);
            document.getElementById('repInfo').innerHTML = `${currentUser.name} | Sales Rep`;
            loadProducts();
        }
        
        async function loadProducts() {
            const { data, error } = await sbClient.from('products').select('*').order('name');
            const container = document.getElementById('productsGrid');
            
            if (error) {
                container.innerHTML = '<p class="text-red-500 col-span-full">Error loading products</p>';
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 col-span-full">No products available</p>';
                return;
            }
            
            container.innerHTML = data.map(product => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-4">
                        <div class="text-4xl mb-2">
                            ${product.category === 'Ring' ? '💍' : product.category === 'Necklace' ? '📿' : product.category === 'Earrings' ? '👂' : '💎'}
                        </div>
                        <h3 class="font-bold text-gray-800">${product.name}</h3>
                        <p class="text-sm text-gray-500">${product.sku}</p>
                        <div class="mt-3">
                            <span class="text-xl font-bold text-blue-600">₹${Number(product.price).toLocaleString()}</span>
                            <span class="text-sm text-gray-500 ml-2">Stock: ${product.stock_quantity}</span>
                        </div>
                        <button onclick="view3D(${product.id}, '${product.name}', ${product.price})" 
                            class="w-full mt-3 bg-purple-600 text-white py-2 rounded-lg text-sm hover:bg-purple-700 transition">
                            🔍 View in 3D
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function view3D(id, name, price) {
            window.location.href = `viewer.html?id=${id}&name=${encodeURIComponent(name)}&price=${price}`;
        }
        
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('krj_user');
            window.location.href = 'sales-login.html';
        };
        
        checkAuth();
    </script>
</body>
</html>
